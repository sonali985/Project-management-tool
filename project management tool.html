<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pro Project Management Tool</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap');
body {
  font-family: 'Poppins', sans-serif;
  margin:0;
  background: linear-gradient(135deg,#667eea,#764ba2);
  color:#333;
}
header {
  text-align:center;
  background:#5a67d8;
  color:white;
  padding:20px;
  font-size:1.8em;
  font-weight:bold;
  box-shadow:0 5px 15px rgba(0,0,0,0.3);
}
.container {
  display:flex;
  flex-wrap:wrap;
  gap:20px;
  padding:20px;
}
.panel {
  background:white;
  border-radius:15px;
  padding:20px;
  flex:1;
  min-width:320px;
  box-shadow:0 10px 30px rgba(0,0,0,0.15);
  transition:0.3s;
}
.panel:hover { box-shadow:0 15px 35px rgba(0,0,0,0.25);}
.panel h2 { margin-bottom:10px;}
input[type="text"], input[type="date"], select {
  width:100%;
  padding:8px;
  margin:5px 0;
  border-radius:8px;
  border:1px solid #ccc;
}
button {
  padding:8px 12px;
  background:#667eea;
  color:white;
  border:none;
  border-radius:8px;
  cursor:pointer;
  margin-top:5px;
  transition:0.3s;
}
button:hover { background:#5a67d8; transform:scale(1.05);}
.project-card, .task-card {
  background:#f1f5ff;
  padding:12px;
  margin-bottom:10px;
  border-radius:12px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  transition:0.3s;
}
.project-card.selected { background:#c3dafe; }
.project-card:hover, .task-card:hover { box-shadow:0 5px 20px rgba(0,0,0,0.2);}
.completed { text-decoration:line-through; color:gray;}
.progress-bar { width:100%; height:14px; background:#eee; border-radius:8px; margin:10px 0; overflow:hidden; }
.progress { height:100%; background:linear-gradient(90deg,#667eea,#764ba2); border-radius:8px; transition:0.5s; }
.task-high { border-left:5px solid #e53e3e; padding-left:7px;}
.task-medium { border-left:5px solid #ecc94b; padding-left:7px;}
.task-low { border-left:5px solid #48bb78; padding-left:7px;}
canvas {position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:100;}
@media(max-width:750px){.container{flex-direction:column;}}
</style>
</head>
<body>

<header>Pro Project Management Tool</header>
<canvas id="confetti"></canvas>

<div class="container">
  <div class="panel" id="projects-panel">
    <h2>Projects</h2>
    <input type="text" id="project-name" placeholder="New Project Name">
    <button onclick="addProject()">Add Project</button>
    <div id="projects-list"></div>
  </div>

  <div class="panel" id="tasks-panel">
    <h2 id="tasks-title">Select a project</h2>
    <input type="text" id="task-name" placeholder="New Task Name">
    <input type="date" id="task-deadline">
    <select id="task-priority">
      <option value="high">High Priority</option>
      <option value="medium" selected>Medium Priority</option>
      <option value="low">Low Priority</option>
    </select>
    <button onclick="addTask()">Add Task</button>
    <div class="progress-bar"><div class="progress" id="progress"></div></div>
    <div id="tasks-list"></div>
  </div>
</div>

<script>
// Data
let projects = JSON.parse(localStorage.getItem("projects")) || [];
let selectedProject = null;

// Save
function saveProjects(){ localStorage.setItem("projects", JSON.stringify(projects)); }

// Render projects (fixed fully)
function renderProjects(){
  const container = document.getElementById("projects-list");
  container.innerHTML="";
  projects.forEach(p=>{
    const div = document.createElement("div");
    div.className = "project-card" + (selectedProject && selectedProject.id===p.id ? " selected" : "");

    // Card click selects project
    div.addEventListener("click", ()=> selectProject(p.id));

    // Inner HTML with Delete button
    div.innerHTML = `<span>${p.name} (${p.tasks.length} tasks)</span>
                     <button class="delete-btn">Delete</button>`;

    // Stop propagation for Delete button
    div.querySelector(".delete-btn").addEventListener("click", (e)=>{
      e.stopPropagation();
      deleteProject(p.id);
    });

    container.appendChild(div);
  });
}

// Select project
function selectProject(id){
  selectedProject = projects.find(p=>p.id===id);
  document.getElementById("tasks-title").innerText = "Tasks in: " + selectedProject.name;
  renderTasks();
  renderProjects();
}

// Add project
function addProject(){
  const name = document.getElementById("project-name").value;
  if(!name) return alert("Enter project name");
  projects.push({id:Date.now(), name:name, tasks:[]});
  saveProjects();
  document.getElementById("project-name").value = "";
  renderProjects();
}

// Delete project
function deleteProject(id){
  if(selectedProject && selectedProject.id===id) selectedProject=null;
  projects = projects.filter(p=>p.id!==id);
  saveProjects();
  renderProjects();
  renderTasks();
}

// Render tasks
function renderTasks(){
  const container = document.getElementById("tasks-list");
  const progressBar = document.getElementById("progress");
  container.innerHTML = "";
  if(!selectedProject){ progressBar.style.width = "0%"; return; }
  selectedProject.tasks.forEach(t=>{
    const div = document.createElement("div");
    div.className = "task-card task-" + t.priority + (t.completed ? " completed" : "");
    div.innerHTML = `<input type="checkbox" ${t.completed ? "checked" : ""} onclick="toggleTask(${t.id})">
                     <span>${t.name} (Due: ${t.deadline})</span>
                     <button onclick="deleteTask(${t.id})">Delete</button>`;
    container.appendChild(div);
  });
  const done = selectedProject.tasks.filter(t=>t.completed).length;
  const total = selectedProject.tasks.length || 1;
  progressBar.style.width = (done/total*100) + "%";
  if(done === selectedProject.tasks.length && selectedProject.tasks.length>0) launchConfetti();
}

// Add task
function addTask(){
  if(!selectedProject) return alert("Select a project first");
  const name = document.getElementById("task-name").value;
  const deadline = document.getElementById("task-deadline").value || new Date().toISOString().split("T")[0];
  const priority = document.getElementById("task-priority").value;
  if(!name) return alert("Enter task name");
  selectedProject.tasks.push({id:Date.now(), name:name, completed:false, deadline:deadline, priority:priority});
  saveProjects();
  document.getElementById("task-name").value = "";
  renderTasks();
  renderProjects();
}

// Toggle task
function toggleTask(id){
  const task = selectedProject.tasks.find(t=>t.id===id);
  task.completed = !task.completed;
  saveProjects();
  renderTasks();
  renderProjects();
}

// Delete task
function deleteTask(id){
  selectedProject.tasks = selectedProject.tasks.filter(t=>t.id!==id);
  saveProjects();
  renderTasks();
  renderProjects();
}

// Confetti animation
function launchConfetti(){
  const canvas = document.getElementById("confetti");
  const ctx = canvas.getContext("2d");
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  let pieces = [];
  for(let i=0;i<200;i++){
    pieces.push({x:Math.random()*canvas.width, y:Math.random()*canvas.height, r:Math.random()*6+4, d:Math.random()*150});
  }
  let anim = setInterval(()=>{
    ctx.clearRect(0,0,canvas.width,canvas.height);
    pieces.forEach(p=>{
      ctx.beginPath();
      ctx.arc(p.x,p.y,p.r,0,Math.PI*2);
      ctx.fillStyle=`hsl(${Math.random()*360},100%,50%)`;
      ctx.fill();
      p.y+=Math.random()*5;
      if(p.y>canvas.height) p.y=0;
    });
  },20);
  setTimeout(()=>clearInterval(anim),3000);
}

// Initialize
renderProjects();
renderTasks();
</script>

</body>
</html>
